version: "3"

services:
  n8n:
    image: n8nio/n8n
    container_name: n8n

    ports:
      - "5678:5678"

    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${WEBHOOK_URL}

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data: